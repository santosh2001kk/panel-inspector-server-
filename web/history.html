<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3DCD58">
<link rel="manifest" href="/manifest.json">
<title>Inspection History — Panel Inspector Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#3DCD58;--bg:#010912;--text:#F2F8FF;--dim:#6A9EC0;--muted:#3A5A7A;
  --red:#FF4757;--amber:#FFA502;--blue:#4A9EFF;--purple:#A855F7;
  --card-bg:rgba(8,22,42,.85);--nav-h:64px;
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 60% 50% at 15% 40%,rgba(61,205,88,.04) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 20%,rgba(74,158,255,.03) 0%,transparent 60%),
    linear-gradient(rgba(61,205,88,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(61,205,88,.018) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,52px 52px,52px 52px;
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(61,205,88,.2);border-radius:3px}
button,input,select{font-family:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  background:rgba(1,9,18,.92);backdrop-filter:blur(40px);border-bottom:1px solid rgba(61,205,88,.1);
  box-shadow:0 0 0 1px rgba(61,205,88,.04),0 8px 40px rgba(0,0,0,.6)}
.nav-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
.nav-logo{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#010912;background:linear-gradient(135deg,#3DCD58,#2BAE47);box-shadow:0 0 28px rgba(61,205,88,.4)}
.nav-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.nav-sub{font-size:10px;color:rgba(106,158,192,.55);font-weight:500;margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .18s}
.nav-back:hover{border-color:rgba(61,205,88,.35);color:var(--green)}
.nav-logout{background:none;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--muted);padding:6px 9px;cursor:pointer;font-size:11px;font-weight:600;transition:all .18s;display:flex;align-items:center;gap:5px}
.nav-logout:hover{border-color:rgba(255,71,87,.4);color:var(--red);background:rgba(255,71,87,.06)}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
.page-head{margin-bottom:28px}
.page-title{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.page-title span{background:linear-gradient(135deg,#3DCD58,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-sub{font-size:13px;color:var(--muted)}

/* FILTERS */
.filters{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.filter-input{padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:all .2s;min-width:200px}
.filter-input:focus{border-color:rgba(61,205,88,.4);background:rgba(61,205,88,.04)}
.filter-input::placeholder{color:rgba(106,158,192,.3)}
.filter-select{padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--dim);font-size:13px;outline:none;cursor:pointer;transition:all .2s}
.filter-select:focus{border-color:rgba(61,205,88,.4)}
.filter-select option{background:#0a1929;color:var(--text)}
.filter-count{margin-left:auto;font-size:12px;color:var(--muted)}

/* GRID */
.scans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* SCAN CARD */
.scan-card{
  background:var(--card-bg);border:1px solid rgba(255,255,255,.07);border-radius:18px;
  overflow:hidden;transition:all .22s ease;cursor:pointer;
}
.scan-card:hover{border-color:rgba(61,205,88,.25);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(61,205,88,.08)}
.scan-thumb{width:100%;height:180px;object-fit:cover;display:block;background:rgba(3,12,24,.8)}
.scan-thumb-ph{width:100%;height:180px;display:flex;align-items:center;justify-content:center;background:rgba(3,12,24,.8);border-bottom:1px solid rgba(255,255,255,.05)}
.scan-thumb-ph i{font-size:36px;color:rgba(61,205,88,.2)}
.scan-body{padding:16px 18px}
.scan-proj{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.scan-site{font-size:11px;color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scan-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.scan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid}
.badge-pg{color:#3DCD58;border-color:rgba(61,205,88,.25);background:rgba(61,205,88,.07)}
.badge-pp{color:#4A9EFF;border-color:rgba(74,158,255,.25);background:rgba(74,158,255,.07)}
.badge-ok{color:#A855F7;border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.07)}
.badge-ab{color:#FF4757;border-color:rgba(255,71,87,.25);background:rgba(255,71,87,.07)}
.badge-un{color:#4A6A8A;border-color:rgba(74,106,138,.2);background:rgba(74,106,138,.06)}
.badge-live{color:#FF4757;border-color:rgba(255,71,87,.25);background:rgba(255,71,87,.07)}
.badge-dead{color:#3DCD58;border-color:rgba(61,205,88,.2);background:rgba(61,205,88,.05)}
.badge-task{color:var(--dim);border-color:rgba(106,158,192,.2);background:rgba(106,158,192,.05)}
.badge-warn{color:var(--amber);border-color:rgba(255,165,2,.25);background:rgba(255,165,2,.07)}
.scan-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(255,255,255,.05)}
.scan-date{font-size:10px;color:var(--muted)}
.scan-user{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.scan-actions{display:flex;gap:6px;margin-top:10px}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;border:1px solid;display:flex;align-items:center;gap:5px}
.btn-print-sm{border-color:rgba(74,158,255,.25);background:rgba(74,158,255,.06);color:var(--blue)}
.btn-print-sm:hover{border-color:rgba(74,158,255,.5);background:rgba(74,158,255,.12)}
.btn-return-sm{border-color:rgba(61,205,88,.25);background:rgba(61,205,88,.06);color:#3DCD58;text-decoration:none}
.btn-return-sm:hover{border-color:rgba(61,205,88,.5);background:rgba(61,205,88,.12)}

/* EMPTY / LOADING */
.state-box{text-align:center;padding:80px 20px;color:var(--muted)}
.state-box i{font-size:48px;color:rgba(61,205,88,.15);margin-bottom:16px;display:block}
.state-box p{font-size:14px;line-height:1.8}
.spinner{width:32px;height:32px;border:3px solid rgba(61,205,88,.15);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* STAT CHIPS */
.stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat-chip{padding:10px 18px;background:var(--card-bg);border:1px solid rgba(255,255,255,.07);border-radius:12px;display:flex;flex-direction:column;gap:2px;min-width:100px}
.stat-num{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}

@media(max-width:600px){
  .nav{padding:0 14px}.page{padding:20px 14px 80px}
  .scans-grid{grid-template-columns:1fr}
  .filters{gap:8px}.filter-input{min-width:0;flex:1}
  .stats-bar{gap:8px}.stat-chip{padding:8px 14px;min-width:80px}
}

/* DETAIL DRAWER */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.detail-overlay.open{opacity:1;pointer-events:auto}
.detail-drawer{position:fixed;top:0;right:0;bottom:0;width:min(480px,100vw);background:#050f1d;border-left:1px solid rgba(61,205,88,.15);z-index:301;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.detail-overlay.open .detail-drawer{transform:translateX(0)}
.detail-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.detail-head-title{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:12px}
.detail-close{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s}
.detail-close:hover{border-color:rgba(255,71,87,.4);color:var(--red);background:rgba(255,71,87,.06)}
.detail-scroll{flex:1;overflow-y:auto;padding:0 20px 20px}
.detail-img{width:calc(100% + 40px);margin:0 -20px;height:220px;object-fit:cover;display:block;background:rgba(3,12,24,.8);border-bottom:1px solid rgba(255,255,255,.06)}
.detail-img-ph{width:calc(100% + 40px);margin:0 -20px;height:180px;display:flex;align-items:center;justify-content:center;background:rgba(3,12,24,.8);border-bottom:1px solid rgba(255,255,255,.06)}
.detail-img-ph i{font-size:48px;color:rgba(61,205,88,.15)}
.detail-section{margin-top:18px}
.detail-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.detail-meta-item label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin-bottom:2px}
.detail-meta-item .val{font-size:13px;font-weight:600;color:var(--text)}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.detail-counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.count-chip{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;text-align:center}
.count-chip .num{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.count-chip .lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px}
.detail-warn-item{padding:8px 12px;border-radius:8px;margin-bottom:5px;font-size:12px;line-height:1.55}
.detail-warn-item.crit{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);color:#ff8a96}
.detail-warn-item.warn{background:rgba(255,165,2,.07);border:1px solid rgba(255,165,2,.2);color:#ffc55e}
.detail-summary{font-size:12px;color:var(--dim);line-height:1.7;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px}
.detail-actions{padding:16px 20px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.detail-btn{padding:13px 18px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:all .18s}
.detail-btn-return{border-color:rgba(61,205,88,.4);background:rgba(61,205,88,.1);color:#3DCD58}
.detail-btn-return:hover{border-color:#3DCD58;background:rgba(61,205,88,.18)}
.detail-btn-print{border-color:rgba(74,158,255,.3);background:rgba(74,158,255,.07);color:var(--blue)}
.detail-btn-print:hover{border-color:rgba(74,158,255,.6);background:rgba(74,158,255,.13)}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">SE</div>
    <div>
      <div class="nav-name">Panel Inspector Pro</div>
      <div class="nav-sub">EcoStruxure™ AI · Schneider Electric</div>
    </div>
  </div>
  <div class="nav-right">
    <a href="home.html" class="nav-back"><i class="fas fa-house"></i> Home</a>
    <a href="index.html" class="nav-back"><i class="fas fa-magnifying-glass"></i> New Inspection</a>
    <button class="nav-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-head">
    <div class="page-title">Inspection <span>History</span></div>
    <div class="page-sub">All past panel inspections — click any card to view details</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-chip"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total Scans</div></div>
    <div class="stat-chip"><div class="stat-num" id="statProjects">0</div><div class="stat-lbl">Projects</div></div>
    <div class="stat-chip"><div class="stat-num" id="statWarns" style="color:var(--amber)">0</div><div class="stat-lbl">With Warnings</div></div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filtersRow" style="display:none">
    <input class="filter-input" id="searchInput" placeholder="Search project, site, panel type…" oninput="applyFilters()">
    <select class="filter-select" id="taskFilter" onchange="applyFilters()">
      <option value="">All tasks</option>
      <option value="commissioning">Commissioning</option>
      <option value="operation">Operation</option>
      <option value="service">Service</option>
      <option value="modification">Modification</option>
      <option value="replacement">Replacement</option>
      <option value="aging">Aging Check</option>
      <option value="others">Others</option>
    </select>
    <select class="filter-select" id="panelFilter" onchange="applyFilters()">
      <option value="">All panel types</option>
      <option value="PrismaSeT G">PrismaSeT G</option>
      <option value="PrismaSeT P">PrismaSeT P</option>
      <option value="Okken">Okken</option>
    </select>
    <div class="filter-count" id="filterCount"></div>
  </div>

  <!-- Grid -->
  <div id="mainContent">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading inspection history…</p>
    </div>
  </div>
</div>

<!-- Detail Drawer -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-drawer" id="detailDrawer">
    <div class="detail-head">
      <div class="detail-head-title" id="detailTitle">Inspection Details</div>
      <button class="detail-close" onclick="closeDetail()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="detail-scroll" id="detailScroll"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>
</div>

<script>
if (localStorage.getItem('pi_auth') !== '1') { window.location.replace('login.html'); }
function doLogout(){ localStorage.removeItem('pi_auth'); localStorage.removeItem('pi_user'); window.location.replace('login.html'); }

const API = window.location.origin;
let allScans = [];

async function loadHistory() {
  try {
    const res = await fetch(`${API}/api/scans`);
    if (!res.ok) throw new Error('Failed to load');
    allScans = await res.json();
    renderStats();
    renderGrid(allScans);
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('filtersRow').style.display = 'flex';
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-box">
        <i class="fas fa-triangle-exclamation" style="color:rgba(255,71,87,.3)"></i>
        <p>Could not load history.<br><small style="color:rgba(106,158,192,.4)">${e.message}</small></p>
      </div>`;
  }
}

function renderStats() {
  const projects = new Set(allScans.map(s => s.project_id).filter(Boolean));
  const warns    = allScans.filter(s => (s.safety_warnings||[]).length > 0);
  document.getElementById('statTotal').textContent    = allScans.length;
  document.getElementById('statProjects').textContent = projects.size;
  document.getElementById('statWarns').textContent    = warns.length;
}

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const task = document.getElementById('taskFilter').value;
  const pt   = document.getElementById('panelFilter').value;
  const filtered = allScans.filter(s => {
    const haystack = [s.project_name, s.site, s.panel_type, s.inspector, s.username, s.notes].join(' ').toLowerCase();
    if (q && !haystack.includes(q)) return false;
    if (task && s.task !== task) return false;
    if (pt && !(s.panel_type||'').includes(pt)) return false;
    return true;
  });
  document.getElementById('filterCount').textContent = `${filtered.length} of ${allScans.length} scans`;
  renderGrid(filtered);
}

function panelBadgeClass(pt) {
  const p = (pt||'').toLowerCase();
  if (p.includes('prismaset g') || p.includes('prisma g')) return 'badge-pg';
  if (p.includes('prismaset p') || p.includes('prisma p')) return 'badge-pp';
  if (p.includes('okken'))                                  return 'badge-ok';
  if (p.includes('abb'))                                    return 'badge-ab';
  return 'badge-un';
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts + (ts.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function cap(s){ return s ? s[0].toUpperCase() + s.slice(1) : '—'; }

let _renderedScans = [];

function renderGrid(scans) {
  if (!scans.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-box">
        <i class="fas fa-folder-open"></i>
        <p>No inspections found.<br><small>Try adjusting your filters or run a new inspection.</small></p>
      </div>`;
    return;
  }
  _renderedScans = scans;
  const html = scans.map((s, idx) => {
    const imgSrc   = s.image_path
      ? (s.image_path.startsWith('http') ? s.image_path : `${API}/api/scan-image/${s.image_path}`)
      : null;
    const ptCls    = panelBadgeClass(s.panel_type);
    const projName = s.project_name || 'No project';
    const site     = s.site || s.username || '—';
    const warns    = (s.safety_warnings||[]).length;
    const task     = cap(s.task);
    const date     = fmtDate(s.timestamp);
    const tech     = s.inspector || s.username || '—';

    return `<div class="scan-card" onclick="openDetail(${idx})">
      ${imgSrc
        ? `<img class="scan-thumb" src="${imgSrc}" alt="Panel" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="scan-thumb-ph" ${imgSrc ? 'style="display:none"' : ''}>
        <i class="fas fa-solar-panel"></i>
      </div>
      <div class="scan-body">
        <div class="scan-proj">${esc(projName)}</div>
        <div class="scan-site"><i class="fas fa-location-dot" style="font-size:9px;margin-right:4px"></i>${esc(site)}</div>
        <div class="scan-meta-row">
          <span class="scan-badge ${ptCls}">${esc(s.panel_type||'Unknown')}</span>
          <span class="scan-badge badge-task"><i class="fas fa-list-check" style="font-size:9px"></i>${esc(task)}</span>
          ${warns ? `<span class="scan-badge badge-warn"><i class="fas fa-triangle-exclamation" style="font-size:9px"></i>${warns} warning${warns>1?'s':''}</span>` : ''}
        </div>
        <div class="scan-footer">
          <div class="scan-date"><i class="fas fa-clock" style="font-size:9px;margin-right:3px"></i>${esc(date)}</div>
          <div class="scan-user"><i class="fas fa-user" style="font-size:9px"></i>${esc(tech)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('mainContent').innerHTML = `<div class="scans-grid">${html}</div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _currentScan = null;

function openDetail(idx) {
  const scan = _renderedScans[idx];
  if (!scan) return;
  _currentScan = scan;
  const imgSrc = scan.image_path
    ? (scan.image_path.startsWith('http') ? scan.image_path : `${API}/api/scan-image/${scan.image_path}`)
    : null;
  const dateStr = fmtDate(scan.timestamp);
  const warns   = (scan.safety_warnings || []);
  const ptCls   = panelBadgeClass(scan.panel_type);

  document.getElementById('detailTitle').textContent = scan.project_name || 'Inspection Details';

  // Build component counts section
  const hasComponents = (scan.breaker_count || scan.acb_count || scan.mccb_count || scan.mcb_count || scan.cubicle_count);
  const countsHtml = hasComponents ? `
    <div class="detail-section">
      <div class="detail-label">Components Detected</div>
      <div class="detail-counts">
        ${scan.acb_count > 0 ? `<div class="count-chip"><div class="num">${scan.acb_count}</div><div class="lbl">ACB</div></div>` : ''}
        ${scan.mccb_count > 0 ? `<div class="count-chip"><div class="num">${scan.mccb_count}</div><div class="lbl">MCCB</div></div>` : ''}
        ${scan.mcb_count > 0 ? `<div class="count-chip"><div class="num">${scan.mcb_count}</div><div class="lbl">MCB</div></div>` : ''}
        ${scan.cubicle_count > 0 ? `<div class="count-chip"><div class="num">${scan.cubicle_count}</div><div class="lbl">Cubicles</div></div>` : ''}
        ${scan.breaker_count > 0 ? `<div class="count-chip"><div class="num" style="color:var(--green)">${scan.breaker_count}</div><div class="lbl">Total</div></div>` : ''}
        ${scan.busbar_side && scan.busbar_side !== 'unknown' ? `<div class="count-chip"><div class="num" style="font-size:13px;padding-top:4px">${scan.busbar_side.toUpperCase()}</div><div class="lbl">Busbar</div></div>` : ''}
      </div>
    </div>` : '';

  // Warnings
  const warnHtml = warns.length ? `
    <div class="detail-section">
      <div class="detail-label"><i class="fas fa-triangle-exclamation" style="color:var(--amber)"></i> Safety Warnings (${warns.length})</div>
      ${warns.map(w => {
        const crit = w.toLowerCase().includes('arc') || w.toLowerCase().includes('energi') || w.toLowerCase().includes('live') || w.includes('🔥');
        return `<div class="detail-warn-item ${crit ? 'crit' : 'warn'}">${esc(w)}</div>`;
      }).join('')}
    </div>` : '';

  const summaryHtml = scan.result_summary ? `
    <div class="detail-section">
      <div class="detail-label">AI Summary</div>
      <div class="detail-summary">${esc(scan.result_summary)}</div>
    </div>` : '';

  document.getElementById('detailScroll').innerHTML = `
    ${imgSrc
      ? `<img class="detail-img" src="${imgSrc}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : ''}
    <div class="detail-img-ph" ${imgSrc ? 'style="display:none"' : ''}>
      <i class="fas fa-solar-panel"></i>
    </div>
    <div class="detail-section" style="margin-top:16px">
      <div class="detail-meta-grid">
        <div class="detail-meta-item"><label>Date</label><div class="val" style="font-size:12px">${esc(dateStr)}</div></div>
        <div class="detail-meta-item"><label>Technician</label><div class="val">${esc(scan.inspector || scan.username || '—')}</div></div>
        <div class="detail-meta-item"><label>Site</label><div class="val">${esc(scan.site || '—')}</div></div>
        <div class="detail-meta-item"><label>Task</label><div class="val">${esc(cap(scan.task))}</div></div>
      </div>
      <div class="detail-badges">
        <span class="scan-badge ${ptCls}">${esc(scan.panel_type || 'Unknown')}</span>
        ${warns.length ? `<span class="scan-badge badge-warn"><i class="fas fa-triangle-exclamation" style="font-size:9px"></i>${warns.length} warning${warns.length > 1 ? 's' : ''}</span>` : '<span class="scan-badge badge-dead"><i class="fas fa-check" style="font-size:9px"></i>No warnings</span>'}
      </div>
    </div>
    ${countsHtml}
    ${warnHtml}
    ${summaryHtml}
  `;

  document.getElementById('detailActions').innerHTML = `
    <a class="detail-btn detail-btn-return" href="index.html?return=${encodeURIComponent(scan.id)}">
      <i class="fas fa-rotate-right"></i> Return Visit — Continue on This Panel
    </a>
    <button class="detail-btn detail-btn-print" onclick="openPrint(_currentScan)">
      <i class="fas fa-print"></i> Print Report
    </button>
  `;

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openPrint(scan) {
  const imgSrc = scan.image_path
    ? (scan.image_path.startsWith('http') ? scan.image_path : `${API}/api/scan-image/${scan.image_path}`)
    : null;
  const date   = new Date((scan.timestamp||'') + (scan.timestamp&&scan.timestamp.endsWith('Z')?'':'Z'));
  const dateStr = date.toLocaleString('en-GB', { dateStyle:'full', timeStyle:'short' });
  const warns  = (scan.safety_warnings||[]);
  const warnRows = warns.map(w => {
    const crit = w.toLowerCase().includes('arc')||w.toLowerCase().includes('energi')||w.toLowerCase().includes('live')||w.includes('🔥');
    return `<div class="warn-item ${crit?'crit':'warn'}">${w}</div>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Panel Inspection Report — ${scan.project_name||'Unnamed'}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;color:#0f1923;background:#fff;padding:28px 32px;font-size:12px;line-height:1.5}
  .rpt-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:2.5px solid #3DCD58;margin-bottom:20px}
  .rpt-brand{display:flex;align-items:center;gap:12px}
  .rpt-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3DCD58,#2BAE47);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#010912;flex-shrink:0}
  .rpt-brand-name{font-size:15px;font-weight:800;color:#0f1923;letter-spacing:-.2px}
  .rpt-brand-sub{font-size:9px;color:#6A9EC0;text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
  .rpt-date{font-size:10px;color:#555;text-align:right}
  .rpt-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#3DCD58;margin-bottom:2px}
  .proj-box{background:#f7fdf9;border:1px solid #d4f0dc;border-radius:12px;padding:16px 20px;margin-bottom:16px}
  .proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .pf label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;display:block;margin-bottom:3px}
  .pf .val{font-size:12px;font-weight:600;color:#0f1923}
  .photo-box{margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;text-align:center;background:#f5f5f5}
  .photo-box img{max-width:100%;max-height:360px;object-fit:contain;display:block;margin:0 auto}
  .sec{margin-bottom:16px}
  .sec-ttl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#888;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e8e8e8}
  .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .badge{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:700;border:1px solid}
  .badge-g{color:#008A2E;border-color:#b3e6c4;background:#f0fbf4}
  .badge-b{color:#1565c0;border-color:#b3d4f7;background:#f0f7ff}
  .badge-p{color:#6a1b9a;border-color:#d7b3f5;background:#fdf4ff}
  .badge-n{color:#555;border-color:#ddd;background:#f9f9f9}
  .int-row{display:flex;gap:10px;margin-bottom:8px}
  .int-chip{padding:5px 14px;border-radius:8px;font-size:11px;font-weight:700}
  .int-task{background:#f0f7ff;border:1px solid #b3d4f7;color:#1565c0}
  .warn-item{padding:8px 12px;border-radius:8px;margin-bottom:5px;font-size:11px;line-height:1.55}
  .warn-item.crit{background:#fff4f4;border:1px solid #ffc5c5;color:#b00}
  .warn-item.warn{background:#fffbf0;border:1px solid #ffe0a0;color:#7a4f00}
  .rpt-footer{margin-top:24px;padding-top:12px;border-top:1px solid #e0e0e0;font-size:9.5px;color:#888;display:flex;justify-content:space-between}
  @media print{body{padding:16px 20px}@page{margin:16mm}}
</style></head><body>
<div class="rpt-header">
  <div class="rpt-brand">
    <div class="rpt-logo">SE</div>
    <div><div class="rpt-brand-name">Panel Inspector Pro</div><div class="rpt-brand-sub">EcoStruxure™ AI · Schneider Electric</div></div>
  </div>
  <div class="rpt-date"><div class="rpt-title">Inspection Report</div><div>${dateStr}</div></div>
</div>
<div class="proj-box">
  <div class="proj-grid">
    <div class="pf"><label>Project / Work Order</label><div class="val">${scan.project_name||'—'}</div></div>
    <div class="pf"><label>Site / Location</label><div class="val">${scan.site||'—'}</div></div>
    <div class="pf"><label>Technician</label><div class="val">${scan.inspector||scan.username||'—'}</div></div>
    <div class="pf"><label>Task</label><div class="val">${cap(scan.task)}</div></div>
  </div>
</div>
${imgSrc ? `<div class="photo-box"><img src="${imgSrc}" alt="Panel photo"></div>` : ''}
<div class="sec">
  <div class="sec-ttl">Panel Identification</div>
  <div class="badge-row"><span class="badge badge-g">${scan.panel_type||'Unknown'}</span>
  ${scan.busbar_side && scan.busbar_side !== 'unknown' ? `<span class="badge badge-n">VBB: ${scan.busbar_side}</span>` : ''}
  </div>
  ${scan.result_summary ? `<p style="font-size:11px;color:#555;line-height:1.6;margin-top:6px">${scan.result_summary}</p>` : ''}
  ${scan.notes ? `<p style="font-size:12px;color:#444;line-height:1.7;margin-top:6px">${scan.notes}</p>` : ''}
</div>
${warns.length ? `<div class="sec"><div class="sec-ttl">Safety Warnings</div>${warnRows}</div>` : ''}
<div class="rpt-footer">
  <span>Panel Inspector Pro · Schneider Electric · Internal Use Only</span>
  <span>Generated ${dateStr}</span>
</div>
<script>setTimeout(()=>window.print(),600);<\/script>
</body></html>`;

  const w = window.open('','_blank');
  if (w) { w.document.write(html); w.document.close(); }
  else alert('Please allow pop-ups to generate the PDF.');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

loadHistory();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>

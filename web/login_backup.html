<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Panel Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#3DCD58;--green-d:#2BAE47;--green-glow:rgba(61,205,88,.28);--green-dim:rgba(61,205,88,.08);
  --bg:#07101F;--surf:#0B1828;--card:#0F2035;--card2:#132540;
  --border:#172E4A;--border2:#1E3B5E;
  --text:#E4EDF8;--dim:#8AAAC8;--muted:#4A6A8A;
  --red:#FF4757;--red-bg:rgba(255,71,87,.08);--red-b:rgba(255,71,87,.3);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overflow:hidden}

/* ── animated grid bg ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(61,205,88,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(61,205,88,.035) 1px,transparent 1px);
  background-size:48px 48px;
  animation:gridShift 20s linear infinite;
  pointer-events:none;
}
@keyframes gridShift{from{background-position:0 0}to{background-position:48px 48px}}

/* ── radial glow ── */
body::after{
  content:'';position:fixed;
  width:700px;height:700px;
  top:50%;left:50%;transform:translate(-50%,-60%);
  background:radial-gradient(circle,rgba(61,205,88,.07) 0%,transparent 65%);
  pointer-events:none;
}

/* ── layout ── */
.page{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;
}

/* ── brand top ── */
.brand{display:flex;align-items:center;gap:12px;margin-bottom:40px;text-align:center}
.brand-logo{
  width:48px;height:48px;border-radius:12px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#07101F;
  box-shadow:0 0 32px var(--green-glow);
  flex-shrink:0;
}
.brand-text{}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.4px;font-weight:400}

/* ── card ── */
.card{
  width:100%;max-width:400px;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:36px 32px;
  box-shadow:0 24px 80px rgba(0,0,0,.45),0 0 0 1px rgba(61,205,88,.06);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:60%;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  border-radius:2px;
}

.card-title{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.card-desc{font-size:13px;color:var(--dim);margin-bottom:28px;font-weight:400;line-height:1.5}

/* ── form ── */
.field{margin-bottom:18px}
.field-label{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;
  color:var(--dim);display:block;margin-bottom:7px;
}
.field-wrap{position:relative}
.field-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:14px;pointer-events:none;transition:color .2s;
}
.field-wrap:focus-within .field-icon{color:var(--green)}
input[type=text],input[type=password]{
  width:100%;padding:12px 14px 12px 40px;
  background:var(--surf);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
input[type=text]:focus,input[type=password]:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(61,205,88,.12);
}
input::placeholder{color:var(--muted)}

/* password toggle */
.pw-toggle{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:4px;font-size:14px;transition:color .2s;line-height:1;
}
.pw-toggle:hover{color:var(--dim)}

/* ── error ── */
.err-box{
  display:none;align-items:center;gap:9px;
  padding:11px 14px;border-radius:9px;
  background:var(--red-bg);border:1px solid var(--red-b);
  font-size:12.5px;color:var(--red);margin-bottom:18px;
  animation:shake .35s ease;
}
.err-box.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}80%{transform:translateX(-3px)}}

/* ── button ── */
.btn-login{
  width:100%;padding:14px;border:none;border-radius:10px;
  background:var(--green);color:#07101F;
  font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .18s,box-shadow .18s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.2px;margin-top:4px;
}
.btn-login:hover{background:var(--green-d);box-shadow:0 0 28px var(--green-glow)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* spinner inside button */
.btn-login .spin{
  display:none;width:16px;height:16px;border:2px solid rgba(7,16,31,.35);
  border-top-color:#07101F;border-radius:50%;animation:spin .6s linear infinite;
}
.btn-login.loading .spin{display:block}
.btn-login.loading .btn-label{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── footer ── */
.login-footer{
  margin-top:28px;text-align:center;
  font-size:11px;color:var(--muted);letter-spacing:.3px;
}
.login-footer i{margin-right:4px;color:var(--green);opacity:.7}

/* ── badge ── */
.secure-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--green-dim);border:1px solid rgba(61,205,88,.18);
  font-size:10px;color:var(--green);font-weight:600;
  letter-spacing:.4px;margin-bottom:20px;
}
.secure-badge i{font-size:9px}

/* ── responsive ── */
@media(max-width:480px){
  .card{padding:28px 20px;border-radius:16px}
  .card-title{font-size:19px}
}
</style>
</head>
<body>

<div class="page">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">SE</div>
    <div class="brand-text">
      <div class="brand-name">Panel Inspector</div>
      <div class="brand-sub">SCHNEIDER ELECTRIC · FIELD TOOL</div>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="secure-badge"><i class="fa-solid fa-shield-halved"></i> SECURE ACCESS</div>
    <div class="card-title">Welcome back</div>
    <div class="card-desc">Sign in with your field engineer credentials to continue.</div>

    <!-- Error -->
    <div class="err-box" id="errBox">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errMsg">Invalid username or password.</span>
    </div>

    <form id="loginForm" autocomplete="off" onsubmit="doLogin(event)">
      <!-- Username -->
      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="field-wrap">
          <i class="fa-regular fa-user field-icon"></i>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" onclick="togglePw()">
            <i class="fa-regular fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spin"></div>
        <span class="btn-label"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</span>
      </button>
    </form>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    <i class="fa-solid fa-circle-dot"></i>Schneider Electric — Internal Use Only
  </div>

</div>

<script>
const API = window.location.origin;

function togglePw() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('pwIcon');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  ico.className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
}

function showErr(msg) {
  const box = document.getElementById('errBox');
  document.getElementById('errMsg').textContent = msg;
  box.classList.remove('show');
  void box.offsetWidth; // force reflow for shake re-trigger
  box.classList.add('show');
}

function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return;

  document.getElementById('errBox').classList.remove('show');
  setLoading(true);

  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });

    if (res.ok) {
      localStorage.setItem('pi_user', username);
      localStorage.setItem('pi_auth', '1');
      window.location.href = 'index.html';
    } else if (res.status === 401) {
      showErr('Invalid username or password. Please try again.');
    } else {
      showErr('Server error. Please try again shortly.');
    }
  } catch {
    showErr('Cannot reach server. Check your connection.');
  } finally {
    setLoading(false);
  }
}

// Already logged in? Skip login page.
if (localStorage.getItem('pi_auth') === '1') {
  window.location.href = 'index.html';
}
</script>
</body>
</html>

services:
  - type: web
    name: panel-inspector
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_KEY
        sync: false
      - key: ANTHROPIC_KEY
        sync: false
    plan: free
